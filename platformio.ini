; DeckSSH — full-featured SSH client for the LilyGo T-Deck Plus (ESP32-S3)
;
; Display, SD and SSH all share the same SPI bus. PSRAM is required: libssh +
; TLS + scrollback won't fit in internal RAM. The huge_app partition is needed
; because libssh + mbedTLS + TFT_eSPI is a large binary.

[env:tdeck-plus]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder, colorize

; --- ESP32-S3 / T-Deck Plus board build ---
board_build.arduino.memory_type = qio_opi      ; 8 MB OPI PSRAM
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.partitions = huge_app.csv          ; 3 MB app, no OTA (room for libssh)
board_upload.flash_size = 16MB
board_build.filesystem = littlefs

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DCORE_DEBUG_LEVEL=2
  ; ---- TFT_eSPI configured entirely via build flags (no User_Setup.h edit) ----
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MISO=38
  -DTFT_MOSI=41
  -DTFT_SCLK=40
  -DTFT_CS=12
  -DTFT_DC=11
  -DTFT_RST=-1
  -DTFT_BL=42
  -DTFT_BACKLIGHT_ON=HIGH
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_GFXFF=1
  -DSMOOTH_FONT=1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=16000000

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.2.0
  ewpa/LibSSH-ESP32@^5.2.0
